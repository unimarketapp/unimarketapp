<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniMarket</title>
  <style>
    :root {
      --orange: #f2541b;
      --orange-dark: #dc3918;
      --gold: #f7b91d;
      --ink: #202124;
      --muted: #5f6368;
      --blue: #0b88f2;
      --green: #34c861;
      --card-shadow: 0 18px 35px rgba(35, 27, 16, 0.12);
      --scene-width: 1024px;
      --scene-height: 480px;
      --scene-bottom: -6px;
      --scene-shift: 0px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, #fff 0%, #fffdf9 58%, #fff4dc 100%);
      min-height: 100svh;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      position: relative;
      isolation: isolate;
      min-height: 100svh;
      padding: 42px 24px 410px;
      text-align: center;
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -4;
      background:
        radial-gradient(ellipse at 88% 68%, rgba(247, 185, 29, 0.12) 0 8%, transparent 19%),
        radial-gradient(ellipse at 10% 76%, rgba(242, 84, 27, 0.08) 0 7%, transparent 18%),
        linear-gradient(135deg, transparent 0 74%, rgba(249, 180, 73, 0.12) 74% 100%);
      pointer-events: none;
    }

    .page::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: var(--scene-bottom);
      z-index: -2;
      width: var(--scene-width);
      height: var(--scene-height);
      max-width: 112vw;
      transform: translateX(-50%);
      background-image: url("web form.jpg");
      background-repeat: no-repeat;
      background-position: center calc(100% - var(--scene-shift));
      background-size: var(--scene-width) auto;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.92) 12%, #000 24%);
      mask-image: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.92) 12%, #000 24%);
      pointer-events: none;
    }

    .bg-js {
      position: absolute;
      inset: 0;
      z-index: -3;
      pointer-events: none;
    }

    .shape {
      position: absolute;
      opacity: 0.38;
      filter: drop-shadow(0 16px 24px rgba(221, 103, 30, 0.16));
    }

    .shape-bag {
      width: 94px;
      height: 104px;
      border-radius: 7px 7px 10px 10px;
      background: linear-gradient(145deg, #ffb163, #f47b29);
    }

    .shape-bag::before {
      content: "";
      position: absolute;
      left: 24px;
      top: -22px;
      width: 42px;
      height: 35px;
      border: 7px solid rgba(242, 84, 27, 0.45);
      border-bottom: 0;
      border-radius: 36px 36px 0 0;
    }

    .shape-pin {
      width: 48px;
      height: 48px;
      border-radius: 50% 50% 50% 0;
      background: #f58428;
      transform: rotate(-45deg);
    }

    .shape-pin::after {
      content: "";
      position: absolute;
      inset: 13px;
      border-radius: 50%;
      background: #fff;
    }

    .shape-cart,
    .shape-percent {
      width: 78px;
      height: 78px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      color: #f47b29;
      font-size: 44px;
      font-weight: 900;
      box-shadow: 0 12px 26px rgba(35, 27, 16, 0.09);
    }

    .shape-cart svg {
      width: 48px;
      height: 48px;
      stroke: currentColor;
      stroke-width: 2.6;
      fill: none;
    }

    .shape-lines {
      width: 168px;
      height: 168px;
      background:
        repeating-linear-gradient(135deg, rgba(245, 152, 53, 0.18) 0 2px, transparent 2px 8px);
      border-radius: 50%;
      opacity: 0.28;
    }

    .hero {
      position: relative;
      z-index: 2;
      width: min(900px, 100%);
      margin: 0 auto;
    }

    .brand {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    .brand-logo {
      width: 196px;
      height: 144px;
      object-fit: cover;
      object-position: center 48%;
      mix-blend-mode: multiply;
    }

    h1 {
      margin: 0;
      font-size: 64px;
      line-height: 1.05;
      font-weight: 950;
      letter-spacing: 0;
    }

    .headline-top {
      display: block;
    }

    .headline-bottom {
      display: block;
      margin-top: 4px;
    }

    .headline-brand {
      color: var(--orange);
      font-weight: 950;
      text-transform: uppercase;
    }

    .copy {
      margin: 24px auto 34px;
      max-width: 620px;
      color: var(--muted);
      font-size: 22px;
      line-height: 1.65;
      font-weight: 600;
      overflow-wrap: break-word;
    }

    .copy p {
      margin: 0;
    }

    .links-grid {
      direction: ltr;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 24px;
      width: min(890px, 100%);
      margin: 0 auto;
    }

    .link-card {
      direction: ltr;
      min-height: 214px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(232, 221, 207, 0.78);
      overflow: hidden;
      display: grid;
      grid-template-rows: 116px auto 56px;
      justify-items: center;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .link-card:hover,
    .link-card:focus-visible {
      transform: translateY(-5px);
      box-shadow: 0 22px 44px rgba(35, 27, 16, 0.16);
      outline: none;
    }

    .icon-crop {
      width: 112px;
      height: 96px;
      margin-top: 16px;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .icon-crop img {
      display: block;
      width: 222px;
      height: auto;
      max-width: none;
      transform: translateY(-8px);
    }

    .icon-crop.apple img {
      width: 214px;
      transform: translateY(-7px);
    }

    .icon-crop.social img {
      width: 220px;
      transform: translateY(-8px);
    }

    .link-title {
      align-self: center;
      margin: 0 10px;
      color: #101418;
      font-size: 24px;
      line-height: 1.1;
      font-weight: 850;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .card-button {
      direction: rtl;
      align-self: stretch;
      width: 100%;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
    }

    .card-button svg {
      order: -1;
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2.3;
      fill: none;
      flex: 0 0 auto;
    }

    .google-btn {
      background: var(--green);
    }

    .apple-btn,
    .facebook-btn {
      background: var(--blue);
    }

    .instagram-btn {
      background: linear-gradient(100deg, #ff7a38 0%, #f52875 58%, #cc2dd1 100%);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 860px) {
      .page {
        padding: 28px 18px 360px;
      }

      .brand-logo {
        width: 166px;
        height: 122px;
      }

      h1 {
        font-size: 48px;
      }

      .copy {
        font-size: 19px;
        margin-top: 18px;
      }

      .links-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        max-width: 470px;
      }

      .link-card {
        min-height: 198px;
        grid-template-rows: 104px auto 52px;
      }

      .link-title {
        font-size: 21px;
      }

      .card-button {
        font-size: 16px;
      }
    }

    @media (max-width: 480px) {
      .page {
        padding: 22px 12px 330px;
      }

      .brand {
        margin-bottom: 18px;
      }

      .brand-logo {
        width: 142px;
        height: 105px;
      }

      h1 {
        font-size: 34px;
        line-height: 1.12;
      }

      .copy {
        max-width: 338px;
        font-size: 15px;
        line-height: 1.75;
        margin-bottom: 24px;
      }

      .links-grid {
        gap: 12px;
      }

      .link-card {
        min-height: 178px;
        grid-template-rows: 88px auto 48px;
        border-radius: 12px;
      }

      .icon-crop {
        width: 86px;
        height: 76px;
        margin-top: 12px;
      }

      .icon-crop img {
        width: 172px;
      }

      .icon-crop.apple img {
        width: 166px;
      }

      .icon-crop.social img {
        width: 170px;
      }

      .link-title {
        font-size: 18px;
      }

      .card-button {
        gap: 8px;
        font-size: 14px;
      }

      .card-button svg {
        width: 18px;
        height: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="bg-js" aria-hidden="true"></div>

    <section class="hero" aria-labelledby="main-title">
      <div class="brand">
        <img class="brand-logo" src="uniform pic.png" alt="UniMarket">
      </div>

      <h1 id="main-title">
        <span class="headline-top">حمّل تطبيق</span>
        <span class="headline-bottom"><span class="headline-brand">UNIMARKET</span></span>
      </h1>

      <div class="copy">
        <p>تسوق بسهولة وسرعة عبر تطبيق UNIMARKET.</p>
        <p>التطبيق متوفر على Google Play و App Store،</p>
        <p>ويمكنك أيضاً متابعتنا على Facebook و Instagram.</p>
      </div>

      <div class="links-grid" aria-label="روابط UniMarket">
        <a class="link-card" href="https://play.google.com/store/apps/details?id=com.unimarket.storeios.Dweek" target="_blank" rel="noopener" aria-label="Google Play">
          <span class="icon-crop">
            <img src="google plat.jpg" alt="">
          </span>
          <strong class="link-title">Google Play</strong>
          <span class="card-button google-btn">
            <span>حمّل التطبيق</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v12"></path>
              <path d="m7 10 5 5 5-5"></path>
              <path d="M5 21h14"></path>
            </svg>
          </span>
        </a>

        <a class="link-card" href="https://apps.apple.com/us/app/unimarket-app/id6755699228" target="_blank" rel="noopener" aria-label="App Store">
          <span class="icon-crop apple">
            <img src="app store.jpg" alt="">
          </span>
          <strong class="link-title">App Store</strong>
          <span class="card-button apple-btn">
            <span>حمّل التطبيق</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v12"></path>
              <path d="m7 10 5 5 5-5"></path>
              <path d="M5 21h14"></path>
            </svg>
          </span>
        </a>

        <a class="link-card" href="https://www.instagram.com/unimarketjo?igsh=M2l4b2FuOTBzZDdw" target="_blank" rel="noopener" aria-label="Instagram">
          <span class="icon-crop social">
            <img src="instagram.jpg" alt="">
          </span>
          <strong class="link-title">Instagram</strong>
          <span class="card-button instagram-btn">
            <span>تابعنا</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14 3h7v7"></path>
              <path d="M10 14 21 3"></path>
              <path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"></path>
            </svg>
          </span>
        </a>

        <a class="link-card" href="https://www.facebook.com/share/1HSTifjp3r/" target="_blank" rel="noopener" aria-label="Facebook">
          <span class="icon-crop social">
            <img src="facebook.jpg" alt="">
          </span>
          <strong class="link-title">Facebook</strong>
          <span class="card-button facebook-btn">
            <span>تابعنا</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14 3h7v7"></path>
              <path d="M10 14 21 3"></path>
              <path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"></path>
            </svg>
          </span>
        </a>
      </div>
    </section>
  </main>

  <script>
    const page = document.querySelector(".page");
    const backgroundLayer = document.querySelector(".bg-js");

    const decorations = [
      { className: "shape-bag", left: "-18px", top: "17%" },
      { className: "shape-lines", right: "8%", top: "4%" }
    ];

    function drawDecorations() {
      backgroundLayer.innerHTML = "";
      decorations.forEach((item) => {
        const shape = document.createElement("span");
        shape.className = `shape ${item.className}`;
        Object.entries(item).forEach(([key, value]) => {
          if (["className", "text", "html"].includes(key)) return;
          shape.style[key] = value;
        });
        if (item.html) shape.innerHTML = item.html;
        if (item.text) shape.textContent = item.text;
        backgroundLayer.appendChild(shape);
      });
    }

    function tuneBackground() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      const sceneWidth = Math.round(Math.min(Math.max(width * 1.04, 700), 1320));
      const sceneHeight = width < 520
        ? Math.round(Math.min(Math.max(height * 0.39, 320), 340))
        : Math.round(Math.min(Math.max(height * 0.38, 330), 505));
      const bottom = width < 520 ? -20 : -92;
      const shift = width < 520 ? 90 : 0;

      page.style.setProperty("--scene-width", `${sceneWidth}px`);
      page.style.setProperty("--scene-height", `${sceneHeight}px`);
      page.style.setProperty("--scene-bottom", `${bottom}px`);
      page.style.setProperty("--scene-shift", `${shift}px`);
    }

    drawDecorations();
    tuneBackground();
    window.addEventListener("resize", tuneBackground, { passive: true });
  </script>
</body>
</html>
